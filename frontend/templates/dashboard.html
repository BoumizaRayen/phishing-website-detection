<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard AI — Dashboard</title>
  <meta name="description" content="Tableau de bord de supervision global des analyses de phishing.">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── Dashboard-specific overrides ── */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .kpi-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .kpi-card.blue::before  { background: linear-gradient(90deg, var(--primary), var(--cyan)); }
    .kpi-card.red::before   { background: linear-gradient(90deg, var(--danger), #f97316); }
    .kpi-card.green::before { background: linear-gradient(90deg, var(--success), #84cc16); }

    .kpi-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .kpi-value {
      font-size: 2.4rem;
      font-weight: 800;
      font-family: var(--font-mono);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }
    .kpi-sub {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* History table */
    .data-section {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .data-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .data-header h2 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: rgba(0,0,0,0.2);
      padding: 0.75rem 1.5rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-glass-hover); }
    tbody td {
      padding: 0.875rem 1.5rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .url-cell {
      max-width: 340px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: var(--radius-full);
    }
    .verdict-badge.phishing {
      background: rgba(239,68,68,0.12);
      color: var(--danger-light);
    }
    .verdict-badge.legitimate {
      background: rgba(16,185,129,0.12);
      color: var(--success-light);
    }
    .verdict-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .verdict-badge.phishing .verdict-dot { background: var(--danger); }
    .verdict-badge.legitimate .verdict-dot { background: var(--success); }

    @media (max-width: 700px) {
      .dash-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .dash-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="history-sidebar">
    <div class="sidebar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>PhishGuard AI</span>
    </div>

    <div class="sidebar-footer" style="margin-top:0; border:none; padding:0;">
      <a href="/" class="sidebar-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Scanner d'URLs
      </a>
      <a href="/docs" class="sidebar-link" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        API Documentation
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <!-- Header -->
    <header class="app-header" style="text-align:left; margin-bottom:2rem;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div>
          <h1 style="font-size:1.75rem; font-weight:800; letter-spacing:-0.025em; margin-bottom:0.25rem;">
            Dashboard de Supervision
          </h1>
          <p class="app-subtitle">Métriques globales en temps réel</p>
        </div>
        <button onclick="loadStats()" class="btn-ghost" style="gap:0.5rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          Actualiser
        </button>
      </div>
    </header>

    <!-- KPIs -->
    <div class="dash-grid" id="kpi-grid">
      <!-- Skeleton placeholder -->
      <div class="kpi-card blue"><div class="kpi-label">Chargement...</div><div class="kpi-value" style="color:var(--text-muted)">—</div></div>
      <div class="kpi-card red"><div class="kpi-label">Chargement...</div><div class="kpi-value" style="color:var(--text-muted)">—</div></div>
      <div class="kpi-card green"><div class="kpi-label">Chargement...</div><div class="kpi-value" style="color:var(--text-muted)">—</div></div>
    </div>

    <!-- Table -->
    <div class="data-section">
      <div class="data-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <h2>10 dernières analyses</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Verdict</th>
            <th>Confiance</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="scan-table-body">
          <tr><td colspan="4" style="padding:2rem; text-align:center; color:var(--text-muted)">Chargement des données...</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="app-footer">
      PhishGuard AI · Dashboard de Monitoring · SQLite
    </footer>
  </main>
</div>

<script>
async function loadStats() {
  try {
    const res  = await fetch('/api/v1/stats');
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    // KPIs
    document.getElementById('kpi-grid').innerHTML = `
      <div class="kpi-card blue">
        <div class="kpi-label">Scans totaux</div>
        <div class="kpi-value">${data.total_scans}</div>
        <div class="kpi-sub">URLs analysées</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Taux de phishing</div>
        <div class="kpi-value" style="color:var(--danger-light)">${data.phishing_ratio}%</div>
        <div class="kpi-sub">${data.phishing_scans} sites dangereux détectés</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Sites légitimes</div>
        <div class="kpi-value" style="color:var(--success-light)">${data.legitimate_scans}</div>
        <div class="kpi-sub">Confiance phishing moy. ${data.avg_phishing_confidence}%</div>
      </div>
    `;

    // Table
    const tbody = document.getElementById('scan-table-body');
    if (!data.recent_scans?.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="padding:2rem; text-align:center; color:var(--text-muted)">Aucune analyse enregistrée.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.recent_scans.map(scan => {
      const cls  = scan.verdict === 'phishing' ? 'phishing' : 'legitimate';
      const conf = scan.confidence ? (scan.confidence * 100).toFixed(1) + '%' : '—';
      const date = new Date(scan.timestamp).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `
        <tr>
          <td class="url-cell" title="${scan.url}">${scan.url}</td>
          <td>
            <span class="verdict-badge ${cls}">
              <span class="verdict-dot"></span>
              ${scan.verdict.toUpperCase()}
            </span>
          </td>
          <td style="font-family:var(--font-mono); font-size:0.82rem; color:${cls === 'phishing' ? 'var(--danger-light)' : 'var(--success-light)'}">
            ${conf}
          </td>
          <td style="color:var(--text-muted)">${date}</td>
        </tr>
      `;
    }).join('');

  } catch (err) {
    document.getElementById('kpi-grid').innerHTML =
      `<div class="kpi-card" style="grid-column:1/-1"><div class="kpi-label">Erreur</div><div style="color:var(--danger-light); font-size:0.85rem">${err.message}</div></div>`;
  }
}

loadStats();
</script>
</body>
</html>
