<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard AI — Détecteur de Phishing</title>
  <meta name="description" content="Scanner d'URLs propulsé par LightGBM avec explicabilité locale (SHAP) en temps réel.">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
</head>
<body>
<div class="app-wrapper">

  <!-- ══ SIDEBAR ══════════════════════════════════ -->
  <aside class="history-sidebar">
    <div class="sidebar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>PhishGuard AI</span>
    </div>

    <p class="sidebar-section-title">Historique</p>
    <div class="history-list" id="history-container">
      <div class="history-empty">Aucun historique récent.</div>
    </div>

    <div class="sidebar-footer">
      <a href="/dashboard" class="sidebar-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard de monitoring
      </a>
      <a href="/docs" class="sidebar-link" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        API Documentation
      </a>
    </div>
  </aside>

  <!-- ══ MAIN ═════════════════════════════════════ -->
  <main class="main-content">

    <!-- Header -->
    <header class="app-header">
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1 class="app-title">PhishGuard AI</h1>
      </div>
    </header>

    <!-- Scanner Card -->
    <div class="scanner-card">
      <p class="scanner-label">Scanner une URL</p>
      <form id="scan-form">
        <div class="input-row">
          <div class="url-input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input type="url" id="url-input" placeholder="https://exemple.com/page-login" autocomplete="off" spellcheck="false">
          </div>
          <button type="submit" id="scan-btn" class="btn-scan">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Analyser
          </button>
        </div>
      </form>
      <div id="error-message" class="error-toast hidden"></div>
    </div>

    <!-- Loading -->
    <div id="loading-state" class="loading-wrap hidden">
      <div class="spinner-ring"></div>
      <p class="loading-text">
        Analyse de structure DOM et vecteur URL<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </p>
    </div>

    <!-- Results -->
    <div id="result-section" class="result-panel hidden">

      <!-- Verdict Banner -->
      <div id="verdict-banner" class="verdict-banner" style="margin-bottom:1rem;">
        <div id="verdict-icon-wrap" class="verdict-icon-wrap">
          <svg id="verdict-svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </div>
        <div class="verdict-info">
          <div id="verdict-label" class="verdict-label">—</div>
          <div id="risk-chip" class="risk-chip">—</div>
        </div>
      </div>

      <!-- Metrics Row -->
      <div class="metrics-row" id="export-target">
        <!-- Threat score card -->
        <div class="metric-card">
          <p class="metric-label">Score de menace</p>
          <div id="threat-value" class="metric-value" style="color: var(--danger-light)">—</div>
          <div class="threat-track">
            <div id="threat-fill" class="threat-fill"></div>
          </div>
        </div>

        <!-- Stats card -->
        <div class="metric-card" id="meta-card">
          <p class="metric-label">Informations de scan</p>
          <div id="meta-content" style="display:flex; flex-direction:column; gap:0.5rem; font-size:0.82rem; color:var(--text-muted);">
            <span>—</span>
          </div>
        </div>
      </div>

      <!-- SHAP Features Panel -->
      <div class="features-panel">
        <p class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Signaux principaux — Explicabilité SHAP locale
        </p>
        <ul id="features-list" class="feature-list">
          <!-- Populated by JS -->
        </ul>
      </div>

      <!-- VirusTotal panel -->
      <div id="vt-panel" class="info-panel hidden">
        <div class="vt-badge" id="vt-content">—</div>
        <span id="analysis-time" style="white-space:nowrap">—</span>
      </div>

      <!-- Actions -->
      <div class="actions-row">
        <button id="btn-reset" class="btn-ghost">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          Nouvelle analyse
        </button>
        <button id="btn-export-pdf" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export PDF
        </button>
      </div>

    </div><!-- /result-panel -->
  </main>

</div><!-- /app-wrapper -->
<script src="/static/script.js"></script>
</body>
</html>
